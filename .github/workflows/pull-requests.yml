name: Pull Requests

on:
  pull_request:
    branches:
      - master

env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  runner:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install, generate and set locale (for i18n tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen en_US.UTF-8 fr_FR.UTF-8 de_DE.UTF-8
          echo "Current default locale: $LANG"

      # Can maybe be replaced with pnpm/action-setup@v4 in the future
      - name: Setup pnpm/corepack
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
      - run: npm i -g --force corepack && corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup PHP with tools
        uses: silverorange/actions-setup-php@v2
        with:
          php-version: '8.2'

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: 'composer install'

      - name: Run tests
        timeout-minutes: 5
        run: |
          composer run phpcs:ci
          pnpm format
          composer run phpstan:ci
          composer run test
